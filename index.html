<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Preload critical hero image -->
    <link rel="preload" as="image" href="/src/assets/hero-beauty.webp" type="image/webp" fetchpriority="high" />

    <!-- Preconnect to Shopify CDN for product images -->
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.shopify.com" />
    <title>Boss Queens Collection — Premium 100% Human Hair Wigs & Bundles | St. Maarten</title>
    <meta name="description" content="Shop premium 100% virgin human hair wigs, bundles, frontals & closures from Boss Queens Collection. Brazilian, Peruvian, Indian hair. Free worldwide shipping over $100. Founded in St. Maarten, Caribbean." />
    <meta name="author" content="Boss Queens Collection" />
    <meta name="keywords" content="human hair wigs, hair bundles, lace front wigs, bob wigs, Brazilian hair, Peruvian hair, Indian hair, HD lace frontal, colored wigs, headband wigs, virgin hair, St. Maarten" />
    <link rel="canonical" href="https://bossqueenscollection.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Boss Queens Collection — Premium 100% Human Hair Wigs & Bundles" />
    <meta property="og:description" content="Shop premium 100% virgin human hair wigs, bundles, frontals & closures. Free worldwide shipping over $100. Founded in St. Maarten." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bossqueenscollection.com" />
    <meta property="og:image" content="https://bossqueenscollection.com/og-image.jpg" />
    <meta property="og:site_name" content="Boss Queens Collection" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@BossQueensHair" />
    <meta name="twitter:title" content="Boss Queens Collection — Premium Human Hair Wigs & Bundles" />
    <meta name="twitter:description" content="100% virgin human hair wigs, bundles & frontals. Free worldwide shipping over $100." />
    <meta name="twitter:image" content="https://bossqueenscollection.com/og-image.jpg" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Boss Queens Collection",
      "url": "https://bossqueenscollection.com",
      "logo": "https://bossqueenscollection.com/icon-512.png",
      "description": "Premium 100% virgin human hair wigs, bundles, frontals and accessories. Founded in St. Maarten, Caribbean.",
      "foundingDate": "2020",
      "foundingLocation": {
        "@type": "Place",
        "name": "St. Maarten, Caribbean"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@bossqueenscollection.com",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://www.instagram.com/bossqueenscollection",
        "https://www.tiktok.com/@bossqueenscollection",
        "https://www.facebook.com/bossqueenscollection"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Boss Queens Collection",
      "url": "https://bossqueenscollection.com",
      "description": "Shop premium 100% human hair wigs, bundles, frontals and closures with free worldwide shipping.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://bossqueenscollection.com/#products?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Store -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Boss Queens Collection",
      "url": "https://bossqueenscollection.com",
      "description": "Premium 100% virgin human hair wigs, bundles, frontals and accessories shipped worldwide from St. Maarten.",
      "image": "https://bossqueenscollection.com/og-image.jpg",
      "priceRange": "$$",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Visa, MasterCard, American Express, Discover, PayPal, Apple Pay, Google Pay",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "SX",
        "addressLocality": "St. Maarten"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Hair Products",
        "itemListElement": [
          {
            "@type": "OfferCatalog",
            "name": "Wigs",
            "itemListElement": [
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Lace Front Wigs"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Bob Wigs"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Headband Wigs"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Colored Wigs"}}
            ]
          },
          {
            "@type": "OfferCatalog",
            "name": "Hair Bundles",
            "itemListElement": [
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Brazilian Body Wave Bundles"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Brazilian Straight Bundles"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Peruvian Deep Wave Bundles"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "Indian Loose Wave Bundles"}}
            ]
          },
          {
            "@type": "OfferCatalog",
            "name": "Frontals & Closures",
            "itemListElement": [
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "13x4 HD Lace Frontal"}},
              {"@type": "Offer", "itemOffered": {"@type": "Product", "name": "4x4 Lace Closure"}}
            ]
          }
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
